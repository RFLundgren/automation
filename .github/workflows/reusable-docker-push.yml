name: Reusable Docker Push

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      # ADD THIS NEW INPUT:
      build_context:
        required: false
        type: string
        default: "."

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set lower case owner and repo
        run: |
          echo "REPO_LC=${REPO,,}" >> ${GITHUB_ENV}
        env:
          REPO: "${{ github.repository_owner }}/${{ inputs.image_name }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          # USE THE INPUT HERE:
          context: ${{ inputs.build_context }}
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:latest
            ghcr.io/${{ env.REPO_LC }}:${{ github.sha }}
